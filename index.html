
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歲月敬好Ｘ共度玗生</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'CustomWeddingFont';
            src: url('/fonts/Iansui-Regular.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'ChenYuluoyanThin';
            src: url('/fonts/ChenYuluoyan-2.0-Thin.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'CustomWeddingFont', cursive;
            font-size: 22px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        
        ::-webkit-scrollbar {
            display: none;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .rose-gold-glow {
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.3);
        }

        .animate-scroll {
            animation: scroll 40s linear infinite;
        }

        @keyframes scroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        .danmu-item {
            position: absolute;
            white-space: nowrap;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            animation: danmu linear forwards;
        }

        @keyframes danmu {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }

        .animate-shimmer {
          background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
          background-size: 200% 100%;
          animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
          0% { background-position: -200% 0; }
          100% { background-position: 200% 0; }
        }

        .mask-linear-gradient {
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-msg-in {
            animation: messageSlideIn 0.5s ease-out both;
        }
    </style>
<script type="importmap">

  }
}

</head>

</body>
</html>
